<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
<title>@capgo/capacitor-stripe-identity Demo</title>

<style>
      html {
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
        touch-action: manipulation;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
      body {
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
      }

      body { font-family: system-ui, sans-serif; margin: 0; padding: 16px; background: #0b1220; color: #e8eefc; }
      main { max-width: 720px; margin: 0 auto; }
      section { margin: 24px 0; padding: 16px; border: 1px solid #24304a; border-radius: 12px; background: #111a2e; }
      label { display: block; margin: 12px 0 6px; font-weight: 600; }
      textarea, input { width: 100%; box-sizing: border-box; border-radius: 8px; border: 1px solid #334466; background: #0d1528; color: #e8eefc; padding: 10px; }
      button { margin: 8px 8px 0 0; padding: 10px 14px; border-radius: 8px; border: 0; background: #635bff; color: white; font-weight: 600; cursor: pointer; }
      pre { white-space: pre-wrap; word-break: break-word; background: #0d1528; padding: 12px; border-radius: 8px; }
    </style>
  </head>
  <body>
    <main>
      <h1>@capgo/capacitor-stripe-identity Demo</h1>
      <p>Present Stripe Identity verification. Create a verification session on your backend first.</p>

      <section>
        <h2>Initialize</h2>
        <label for="publishableKey">Publishable key</label>
        <input id="publishableKey" value="pk_test_replace_me" />
        <button id="initializeButton" type="button">Initialize</button>
      </section>

      <section>
        <h2>Verification Sheet</h2>
        <label for="createOptions">create options (JSON)</label>
        <textarea id="createOptions" rows="6">{
  "verificationId": "vs_replace_me",
  "ephemeralKeySecret": "ek_replace_me",
  "clientSecret": "vs_replace_me_secret_replace_me"
}</textarea>
        <button id="createButton" type="button">Create Sheet</button>
        <button id="presentButton" type="button">Present Sheet</button>
      </section>

      <section>
        <h2>Output</h2>
        <p id="statusLine">Status: Idle</p>
        <pre id="outputLog">Awaiting interaction.</pre>
      </section>
    </main>
    <script src="./js/example.js" type="module"></script>
  </body>
</html>
